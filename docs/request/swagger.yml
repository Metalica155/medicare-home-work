openapi: 3.0.3

info:
  title: Doctors API
  description: REST API for managing doctors.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Local Development

paths:
  /ping:
    get:
      tags:
        - ping
      summary: Basic health check
      operationId: ping
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pong"

  /doctors:
    get:
      tags:
        - Doctors
      summary: List doctors
      operationId: listDoctors
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          required: true
          description: page number
          example: 1

      responses:
        "200":
          description: Doctors retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorCollection"

    post:
      tags:
        - Doctors
      summary: Create doctor
      operationId: createDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDoctorRequest"
      responses:
        "201":
          description: Doctor created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "400":
          $ref: "#/components/responses/ValidationError"

  /doctors/{id}:
    get:
      tags:
        - Doctors
      summary: Get doctor by ID
      operationId: getDoctor
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Doctor retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - Doctors
      summary: Patch doctor by ID
      operationId: patchDoctor
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorRequest"
      responses:
        "204":
          description: Doctor updated successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

    delete:
      tags:
        - Doctors
      summary: Delete doctor by ID
      operationId: deleteDoctor
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Doctor deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"

  /patients:
    get:
      tags:
        - Patients
      summary: List Patients
      operationId: listPatients
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          required: true
          description: page number
          example: 1

      responses:
        "200":
          description: Patients retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCollection"

    post:
      tags:
        - Patients
      summary: Create patient
      operationId: createPatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "400":
          $ref: "#/components/responses/ValidationError"

  /patients/{id}:
    get:
      tags:
        - Patients
      summary: Get patient by ID
      operationId: getPatient
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Patient retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - Patients
      summary: Patch patient by ID
      operationId: patchPatient
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "204":
          description: Patient updated successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

    delete:
      tags:
        - Patients
      summary: Delete patient by ID
      operationId: deletePatient
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Patient deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"

  /availabilities:
    get:
      tags:
        - Availability
      summary: Get availabilities
      operationId: getAvailabilities
      parameters:
        - $ref: "#/components/parameters/DoctorId"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Availabilities retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityCollection"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: ID
      schema:
        type: integer
        example: 1

    DoctorId:
      name: doctor_id
      in: query
      required: false
      description: Doctor ID
      schema:
        type: integer
        example: 1

    Order:
      name: order
      in: query
      required: false
      description: Order of the result set
      $ref: "#/components/schemas/Order"

    From:
      name: from
      in: query
      required: false
      description: from
      schema:
        type: string
        format: date
        example: 2026-07-01T09:00:00

    To:
      name: to
      in: query
      required: false
      description: to
      schema:
        type: string
        format: date
        example: 2026-07-01T09:00:00

  schemas:
    Pong:
      type: string
      example: pong

    Order:
      type: string
      enum:
        - asc
        - desc
      default: desc
      example: desc

    Doctor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        expertise:
          $ref: "#/components/schemas/Expertise"

    Patient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        phone_number:
          $ref: "#/components/schemas/PhoneNumber"

    DoctorCollection:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Doctor"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PatientCollection:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Patient"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          format: uri
          nullable: true
        last:
          type: string
          format: uri
          nullable: true
        prev:
          type: string
          format: uri
          nullable: true
        next:
          type: string
          format: uri
          nullable: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 3
        from:
          type: integer
          nullable: true
          example: 31
        last_page:
          type: integer
          example: 8
        links:
          type: array
          items:
            $ref: "#/components/schemas/PaginationLink"
        path:
          type: string
          format: uri
        per_page:
          type: integer
          example: 15
        to:
          type: integer
          nullable: true
          example: 45
        total:
          type: integer
          example: 111

    PaginationLink:
      type: object
      properties:
        url:
          type: string
          format: uri
          nullable: true
        label:
          type: string
          example: "1"
        page:
          type: integer
          nullable: true
          example: 1
        active:
          type: boolean

    Expertise:
      type: string
      enum:
        - Cardiologist
        - Dermatoloist
        - Neurologist
        - General Practitioner

    PhoneNumber:
      type: string
      format: phone number
      example: +36706666666

    Availability:
      type: object
      properties:
        doctor:
          $ref: "#/components/schemas/Doctor"
        startsAt:
          type: string
          format: date
          example: 2026-07-02 08:00:00
        endsAt:
          type: string
          format: date
          example: 2026-07-02 08:00:0
        slotDuration:
          type: integer
          example: 30

    AvailabilityCollection:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Availability"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateDoctorRequest:
      type: object
      required:
        - name
        - email
        - expertise
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        expertise:
          $ref: "#/components/schemas/Expertise"

    CreatePatientRequest:
      type: object
      required:
        - name
        - email
        - phone_number
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          $ref: "#/components/schemas/PhoneNumber"

    UpdateDoctorRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        expertise:
          $ref: "#/components/schemas/Expertise"

    UpdatePatientRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          $ref: "#/components/schemas/PhoneNumber"

    Error:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    UnprocessableContent:
      description: Unprocessable content
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
