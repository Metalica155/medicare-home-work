openapi: 3.0.3

info:
  title: Doctors API
  description: REST API for managing doctors.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Local Development

paths:
  /ping:
    get:
      tags:
        - ping
      summary: Basic health check
      operationId: ping
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pong"

  /doctors:
    get:
      tags:
        - Doctors
      summary: List doctors
      operationId: listDoctors
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          required: true
          description: page number
          example: 1

      responses:
        "200":
          description: Doctors retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorCollection"

    post:
      tags:
        - Doctors
      summary: Create doctor
      operationId: createDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDoctorRequest"
      responses:
        "201":
          description: Doctor created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "422":
          $ref: "#/components/responses/UnprocessableContent"
        "400":
          $ref: "#/components/responses/ValidationError"

  /doctors/{id}:
    get:
      tags:
        - Doctors
      summary: Get doctor by ID
      operationId: getDoctor
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      responses:
        "200":
          description: Doctor retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - Doctors
      summary: Patch doctor by ID
      operationId: patchDoctor
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorRequest"
      responses:
        "204":
          description: Doctor updated successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableContent"

    delete:
      tags:
        - Doctors
      summary: Delete doctor by ID
      operationId: deleteDoctor
      parameters:
        - $ref: "#/components/parameters/DoctorId"
      responses:
        "204":
          description: Doctor deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    DoctorId:
      name: id
      in: path
      required: true
      description: Doctor ID
      schema:
        type: integer
        example: 1

  schemas:
    Pong:
      type: string
      example: pong
    Doctor:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        expertise:
          $ref: "#/components/schemas/Expertise"

    DoctorCollection:
      type: object
      required:
        - data
        - links
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Doctor"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          format: uri
          nullable: true
        last:
          type: string
          format: uri
          nullable: true
        prev:
          type: string
          format: uri
          nullable: true
        next:
          type: string
          format: uri
          nullable: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 3
        from:
          type: integer
          nullable: true
          example: 31
        last_page:
          type: integer
          example: 8
        links:
          type: array
          items:
            $ref: "#/components/schemas/PaginationLink"
        path:
          type: string
          format: uri
        per_page:
          type: integer
          example: 15
        to:
          type: integer
          nullable: true
          example: 45
        total:
          type: integer
          example: 111

    PaginationLink:
      type: object
      properties:
        url:
          type: string
          format: uri
          nullable: true
        label:
          type: string
          example: "1"
        page:
          type: integer
          nullable: true
          example: 1
        active:
          type: boolean

    Expertise:
      type: string
      enum:
        - Cardiologist
        - Dermatoloist
        - Neurologist
        - General Practitioner

    CreateDoctorRequest:
      type: object
      required:
        - name
        - email
        - expertise
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        expertise:
          $ref: "#/components/schemas/Expertise"

    UpdateDoctorRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        expertise:
          $ref: "#/components/schemas/Expertise"

    Error:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    UnprocessableContent:
      description: Unprocessable content
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
